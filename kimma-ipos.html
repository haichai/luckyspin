<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>haichai - Nhận Ưu Đãi & Vòng Quay May Mắn</title>
    <style>
        /* Reset & Base */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #1a1a1a; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        
        /* Main Button (Vòng quay may mắn) */
        .spin-btn { 
            background-color: #d32f2f; 
            color: white; 
            border: none; 
            padding: 16px 32px; 
            font-size: 1.2rem; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            text-decoration: none; 
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.4); 
            transition: transform 0.2s, box-shadow 0.2s; 
            margin-bottom: 15px;
            display: block;
            text-align: center;
        }
        .spin-btn:active { 
            transform: scale(0.95); 
            box-shadow: 0 2px 10px rgba(211, 47, 47, 0.3);
        }

        /* Popup Modal */
        .modal-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.75); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 1000; 
            opacity: 0; 
            visibility: hidden; 
            transition: all 0.3s ease; 
        }
        .modal-overlay.active { 
            opacity: 1; 
            visibility: visible; 
        }
        .modal-content { 
            background: white; 
            padding: 30px 20px; 
            border-radius: 12px; 
            text-align: center; 
            width: 90%; 
            max-width: 350px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            transform: translateY(20px);
            transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        
        .modal-content h2 { margin-bottom: 12px; font-size: 1.4rem; color: #111; }
        .modal-content p { color: #555; margin-bottom: 24px; font-size: 0.95rem; line-height: 1.5; }
        
        /* TikTok Button */
        .tiktok-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 8px;
            background-color: #000; 
            color: #fff; 
            padding: 14px 25px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            width: 100%; 
            margin-bottom: 15px; 
            font-size: 1rem;
            transition: transform 0.2s;
        }
        .tiktok-btn:active { transform: scale(0.98); }
        
        /* Zalo Blue Button */
        .close-btn { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background-color: #0068ff; 
            color: #fff; 
            padding: 14px 25px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            width: 100%; 
            border: none;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(0, 104, 255, 0.2);
            transition: transform 0.2s, background-color 0.2s;
        }
        .close-btn:hover { background-color: #0056d4; }
        .close-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>


    <div class="modal-overlay" id="tiktokModal">
        <div class="modal-content">
            <h2>Theo dõi haichai ngay!</h2>
            <p>Nhận thêm nhiều chương trình khuyến mãi và ưu đãi đặc biệt chỉ dành riêng cho follower TikTok.</p>
            
           <a href="https://store.haichai.workers.dev/tiktokhaichai" target="_blank" class="tiktok-btn" onclick="closeModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M9 0h1.98c.144.715.54 1.617 1.235 2.512C12.895 3.389 13.797 4 15 4v2c-1.753 0-3.07-.814-4-1.829V11a5 5 0 1 1-5-5v2a3 3 0 1 0 3 3z"/>
                </svg>
                Follow TikTok
            </a>
            
            <button class="close-btn" onclick="window.location.href='https://store.haichai.workers.dev/kimma-ipos'">Tới vòng quay may mắn</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('tiktokModal').classList.add('active');
            }, 500); 
        };
        function closeModal() {
            document.getElementById('tiktokModal').classList.remove('active');
        }
    </script>
</body>
</html>
